name: CI & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Fast frontend gates on every push / PR.
  check:
    name: Lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  # Build the desktop installers on macOS and Windows.
  # Runs on version tags (v*) and manual dispatch; produces a draft GitHub
  # Release with the .dmg (macOS) and .msi + NSIS .exe (Windows).
  build:
    name: Build (${{ matrix.platform }})
    needs: check
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile

      # Rust gates (run on the real target OS).
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ----------------------------------------------------------------
          # Code signing & notarization — add these repository secrets to
          # produce signed, distributable builds (otherwise builds are
          # unsigned; see the Gatekeeper note in the README).
          #
          # macOS (signing + notarization):
          #   APPLE_CERTIFICATE            base64 of the .p12 cert
          #   APPLE_CERTIFICATE_PASSWORD   .p12 password
          #   APPLE_SIGNING_IDENTITY       e.g. "Developer ID Application: …"
          #   APPLE_ID / APPLE_PASSWORD    Apple ID + app-specific password
          #   APPLE_TEAM_ID                Apple Developer Team ID
          #
          # Windows (Authenticode):
          #   WINDOWS_CERTIFICATE          base64 of the .pfx cert
          #   WINDOWS_CERTIFICATE_PASSWORD .pfx password
          #
          # Docs: https://tauri.app/distribute/
          # ----------------------------------------------------------------
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('ReadMD {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false
